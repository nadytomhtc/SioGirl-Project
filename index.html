<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SioGirl VRM 互動中心</title>
    <script src="https://unpkg.com/three@0.145.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.145.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@1.0.0/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 50%; height: 100%; border-right: 2px solid #1e293b; }
        #ui-panel { width: 50%; padding: 20px; display: flex; flex-direction: column; }
        #chat-box { flex: 1; background: #1e293b; border-radius: 12px; padding: 15px; overflow-y: auto; margin-bottom: 10px; }
        #status { color: #60a5fa; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-panel">
        <div id="status">系統：正在讀取 SioGirl_Larry.vrm...</div>
        <div id="chat-box"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="對她說話..." style="flex:1; padding:10px; border-radius:8px; border:none; background:#334155; color:white;">
            <button onclick="chat()" style="padding:10px 20px; background:#3b82f6; border:none; color:white; border-radius:8px; cursor:pointer;">發送</button>
        </div>
    </div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, (window.innerWidth/2) / window.innerHeight, 0.1, 20);
    camera.position.set(0, 1.4, 1.3);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth/2, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    const loader = new THREE.GLTFLoader();
    // 關鍵：讀取你剛剛上傳的同資料夾 VRM
    loader.load('./SioGirl_Larry.vrm', (gltf) => {
        THREE.VRM.from(gltf).then((vrm) => {
            scene.add(vrm.scene);
            vrm.scene.rotation.y = Math.PI;
            document.getElementById('status').innerText = "狀態：SioGirl 已連線";
        });
    }, undefined, (error) => {
        document.getElementById('status').innerText = "讀取失敗，請檢查檔名是否正確";
    });

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    function chat() {
        const input = document.getElementById('user-input');
        const text = input.value;
        if(!text) return;
        document.getElementById('chat-box').innerHTML += `<p style="color:#94a3b8">你: ${text}</p>`;
        input.value = "";
        
        setTimeout(() => {
            const resp = "哈囉！我是 SioGirl_Larry。準備好跟我一起在 VIVERSE 創造金流了嗎？";
            document.getElementById('chat-box').innerHTML += `<p style="color:#3b82f6">SioGirl: ${resp}</p>`;
            const utter = new SpeechSynthesisUtterance(resp);
            utter.lang = 'zh-TW';
            window.speechSynthesis.speak(utter);
        }, 800);
    }
</script>
</body>
</html>
