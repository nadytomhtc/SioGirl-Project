<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SioGirl VRM 互動中心 - 進度版</title>
    <script src="https://unpkg.com/three@0.145.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.145.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@1.0.0/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 50%; height: 100%; border-right: 2px solid #1e293b; position: relative; }
        #ui-panel { width: 50%; padding: 20px; display: flex; flex-direction: column; }
        #chat-box { flex: 1; background: #1e293b; border-radius: 12px; padding: 15px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #334155; }
        
        /* 進度條樣式 */
        #loader-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%; }
        #progress-bar-container { width: 100%; height: 10px; background: #334155; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.3s; }
        #percent-text { font-size: 24px; font-weight: bold; color: #60a5fa; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loader-wrapper">
            <div id="percent-text">正在召喚 SioGirl... 0%</div>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 10px;">首次載入較慢，請稍候</p>
        </div>
    </div>

    <div id="ui-panel">
        <div id="chat-box"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="對她說話..." style="flex:1; padding:12px; border-radius:8px; border:none; background:#334155; color:white;">
            <button onclick="chat()" style="padding:10px 20px; background:#3b82f6; border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">發送</button>
        </div>
    </div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, (window.innerWidth/2) / window.innerHeight, 0.1, 20);
    camera.position.set(0, 1.4, 1.3);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth/2, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const loader = new THREE.GLTFLoader();
    
    // 載入 VRM 並監控進度
    loader.load('./SioGirl_Larry.vrm', 
        (gltf) => {
            THREE.VRM.from(gltf).then((vrm) => {
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI;
                // 隱藏載入器
                document.getElementById('loader-wrapper').style.display = 'none';
                document.getElementById('chat-box').innerHTML += `<p style="color:#60a5fa">[系統] SioGirl_Larry 已就緒。</p>`;
            });
        }, 
        (progress) => {
            // 計算百分比
            const percent = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('percent-text').innerText = `正在召喚 SioGirl... ${percent}%`;
        }, 
        (error) => {
            console.error(error);
            document.getElementById('percent-text').innerText = "讀取失敗，請確認檔案路徑";
        }
    );

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    function chat() {
        const input = document.getElementById('user-input');
        const text = input.value;
        if(!text) return;
        document.getElementById('chat-box').innerHTML += `<p style="color:#94a3b8">你: ${text}</p>`;
        input.value = "";
        
        setTimeout(() => {
            const resp = "哈囉！進度條跑完我就出現了！這就是 AI 導流的第一步。";
            document.getElementById('chat-box').innerHTML += `<p style="color:#3b82f6">SioGirl: ${resp}</p>`;
            const utter = new SpeechSynthesisUtterance(resp);
            utter.lang = 'zh-TW';
            window.speechSynthesis.speak(utter);
        }, 800);
    }
</script>
</body>
</html>
