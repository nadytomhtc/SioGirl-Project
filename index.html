<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>SioGirl AI 虛擬明星 MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.0/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; background: #0b0f1a; color: white; display: flex; height: 100vh; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #viewer { width: 55%; height: 100%; position: relative; background: radial-gradient(circle, #2d3748 0%, #0b0f1a 100%); }
        #panel { width: 45%; padding: 25px; background: #1a202c; display: flex; flex-direction: column; border-left: 2px solid #4a5568; box-sizing: border-box; }
        #status-bar { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 8px; font-size: 14px; color: #63b3ed; border: 1px solid #2b6cb0; }
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; background: #0f172a; border-radius: 10px; font-size: 15px; line-height: 1.6; margin-bottom: 15px; border: 1px solid #334155; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #4a5568; background: #2d3748; color: white; font-size: 15px; }
        button { padding: 12px 25px; background: linear-gradient(135deg, #3182ce, #805ad5); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        .msg-user { color: #a0aec0; margin-bottom: 10px; }
        .msg-ai { color: #63b3ed; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="viewer">
        <div id="status-bar">🚀 系統啟動中...</div>
    </div>
    <div id="panel">
        <h2 style="margin-top:0; color:#e2e8f0;">SioGirl 互動終端</h2>
        <div id="chat-log">
            <div class="msg-user">系統提示：等待模型載入完成後即可開始對話。</div>
        </div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="嗨！跟 SioGirl 說點什麼..." onkeypress="if(event.keyCode==13) sendMsg()">
            <button onclick="sendMsg()">傳送訊息</button>
        </div>
    </div>

<script>
    // --- 1. 設定 3D 場景 ---
    const scene = new THREE.Scene();
    // 攝影機位置 (X:左右, Y:上下高度, Z:遠近距離)
    const camera = new THREE.PerspectiveCamera(35, (window.innerWidth*0.55) / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.35, 2.8); 

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth * 0.55, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('viewer').appendChild(renderer.domElement);

    // 打光 (讓角色看起來明亮)
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.8);
    directionalLight.position.set(1, 1, 1).normalize();
    scene.add(directionalLight);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    // --- 2. 載入 VRM 模型 ---
    const status = document.getElementById('status-bar');
    const loader = new THREE.GLTFLoader();
    
    // 允許跨網域讀取模型
    loader.setCrossOrigin('anonymous');

    // 這裡已經幫你換成官方測試用兔子女孩模型的網址！
    const modelFileName = 'https://raw.githubusercontent.com/pixiv/three-vrm/master/packages/three-vrm/examples/models/vrm/three-vrm-girl.vrm'; 

    loader.load(
        modelFileName, 
        (gltf) => {
            THREE.VRM.from(gltf).then((vrm) => {
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI; // 讓角色轉向正面看著鏡頭
                status.innerText = "✅ SioGirl 測試模組已上線！";
                document.getElementById('chat-log').innerHTML += `<div class="msg-ai">SioGirl 已準備好為您展示 VIVERSE 元宇宙體驗！</div>`;
            });
        },
        (progress) => {
            if(progress.total > 0) {
                status.innerText = `⏳ 模型載入中: ${Math.round((progress.loaded/progress.total)*100)}%`;
            } else {
                status.innerText = `⏳ 模型下載中...`;
            }
        },
        (error) => { 
            status.innerText = "❌ 讀取失敗，請確認網路連線"; 
            console.error(error);
        }
    );

    // 每秒刷新畫面
    function animate() { 
        requestAnimationFrame(animate); 
        renderer.render(scene, camera); 
    }
    animate();

    // --- 3. 聊天與語音互動 ---
    function sendMsg() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        const log = document.getElementById('chat-log');
        
        // 顯示玩家訊息
        log.innerHTML += `<div class="msg-user">你: ${input.value}</div>`;
        
        // 模擬 AI 思考延遲
        setTimeout(() => {
            const response = "哈囉！我是 SioGirl！你覺得我今天這套兔子裝好看嗎？未來我們可以在 VIVERSE 裡面一起互動喔！";
            log.innerHTML += `<div class="msg-ai">SioGirl: ${response}</div>`;
            
            // 語音播放
            const utter = new SpeechSynthesisUtterance(response);
            utter.lang = 'zh-TW';
            utter.rate = 1.1; // 說話語速稍微快一點，比較活潑
            window.speechSynthesis.speak(utter);
            
            log.scrollTop = log.scrollHeight; // 自動捲動到底部
        }, 600);
        
        input.value = "";
    }
</script>
</body>
</html>
