<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SioGirl VRM 終極修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.0/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; background: #0b0f1a; color: white; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #viewer { width: 50%; height: 100%; border-right: 2px solid #2d3748; background: radial-gradient(circle, #1a202c 0%, #0b0f1a 100%); position: relative; }
        #panel { width: 50%; padding: 25px; display: flex; flex-direction: column; background: #1a202c; }
        #status-bar { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 12px; border-left: 3px solid #4299e1; }
        #chat-log { flex: 1; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px solid #2d3748; padding-bottom: 10px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #4a5568; background: #2d3748; color: white; width: calc(100% - 100px); }
        button { padding: 12px; background: #4299e1; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="viewer">
        <div id="status-bar">🚀 正在連線 SioGirl 核心...</div>
    </div>
    <div id="panel">
        <div id="chat-log"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="對 SioGirl 說點什麼...">
            <button onclick="sendChat()">發送</button>
        </div>
    </div>

<script>
    // --- 基礎環境設定 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, (window.innerWidth/2) / window.innerHeight, 0.1, 100);
    camera.position.set(0.0, 1.4, 3.5); // 拉遠一點點，確保角色在視野內

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth / 2, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('viewer').appendChild(renderer.domElement);

    // 光影加強（避免角色太黑看不見）
    const light = new THREE.DirectionalLight(0xffffff, 1.5);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    const status = document.getElementById('status-bar');
    const loader = new THREE.GLTFLoader();

    // 跨網域處理（針對 GitHub Pages）
    loader.setCrossOrigin('anonymous');

    // --- 載入 VRM ---
    const vrmUrl = './SioGirl_Larry.vrm'; 
    status.innerText = "⏳ 載入模型中：0%";

    loader.load(
        vrmUrl,
        (gltf) => {
            THREE.VRM.from(gltf).then((vrm) => {
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI; // 轉向正面
                status.innerText = "✅ SioGirl 已降臨！";
                console.log("VRM 載入成功", vrm);
            }).catch(e => {
                status.innerText = "❌ 解析錯誤：" + e.message;
            });
        },
        (progress) => {
            const loadPercent = Math.round((progress.loaded / (progress.total || 24000000)) * 100);
            status.innerText = `⏳ 載入模型中：${loadPercent}%`;
        },
        (error) => {
            status.innerText = "❌ 檔案讀取失敗，請確認檔名";
            console.error(error);
        }
    );

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    // --- 聊天邏輯 ---
    function sendChat() {
        const input = document.getElementById('user-input');
        const chatLog = document.getElementById('chat-box');
        if (!input.value) return;
        
        const userText = input.value;
        const msg = document.createElement('p');
        msg.innerText = "你: " + userText;
        document.getElementById('chat-log').appendChild(msg);
        input.value = "";

        setTimeout(() => {
            const response = "我是 SioGirl_Larry。如果你還沒看到我，請嘗試重新整理網頁！";
            const aiMsg = document.createElement('p');
            aiMsg.style.color = "#63b3ed";
            aiMsg.innerText = "SioGirl: " + response;
            document.getElementById('chat-log').appendChild(aiMsg);
            
            const utter = new SpeechSynthesisUtterance(response);
            utter.lang = 'zh-TW';
            window.speechSynthesis.speak(utter);
        }, 800);
    }
</script>
</body>
</html>
