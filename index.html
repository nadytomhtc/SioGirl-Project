<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SioGirl 終極相容版</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.0/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; background: #0b0f1a; color: white; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #viewer { width: 60%; height: 100%; position: relative; background: #000; }
        #panel { width: 40%; padding: 20px; background: #1a202c; display: flex; flex-direction: column; border-left: 2px solid #2d3748; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; font-size: 12px; color: #63b3ed; }
        #chat-log { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #4a5568; background: #2d3748; color: white; }
        button { padding: 10px 20px; background: #3182ce; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="viewer">
        <div id="status">正在檢查核心元件...</div>
    </div>
    <div id="panel">
        <div id="chat-log"></div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="說點什麼...">
            <button onclick="send()">發送</button>
        </div>
    </div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, (window.innerWidth*0.6) / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.3, 3); 

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth * 0.6, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('viewer').appendChild(renderer.domElement);

    scene.add(new THREE.DirectionalLight(0xffffff, 2.0));
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const status = document.getElementById('status');
    const loader = new THREE.GLTFLoader();

    // 修改處：讀取 .glb 檔案
    loader.load('./SioGirl_Larry.glb', 
        (gltf) => {
            THREE.VRM.from(gltf).then((vrm) => {
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI;
                status.innerText = "✅ SioGirl 已連線";
                console.log("載入成功！");
            });
        },
        (p) => { status.innerText = `⏳ 載入中: ${Math.round((p.loaded/p.total)*100)}%`; },
        (e) => { status.innerText = "❌ 讀取失敗，請確認檔案已改名為 .glb"; }
    );

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    animate();

    function send() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        const log = document.getElementById('chat-log');
        log.innerHTML += `<p>你: ${input.value}</p>`;
        
        setTimeout(() => {
            const r = "看到我的 3D 身體了嗎？如果還是黑的，請確認你有把檔案改名為 .glb 並上傳！";
            log.innerHTML += `<p style="color:#63b3ed">SioGirl: ${r}</p>`;
            const u = new SpeechSynthesisUtterance(r);
            u.lang = 'zh-TW';
            window.speechSynthesis.speak(u);
        }, 500);
        input.value = "";
    }
</script>
</body>
</html>
