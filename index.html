<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SioGirl VRM 穩定版</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.0/lib/three-vrm.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 50%; height: 100%; border-right: 2px solid #1e293b; position: relative; }
        #ui-panel { width: 50%; padding: 20px; display: flex; flex-direction: column; }
        #chat-box { flex: 1; background: #1e293b; border-radius: 12px; padding: 15px; overflow-y: auto; margin-bottom: 10px; }
        #loader-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        #status-msg { color: #60a5fa; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loader-wrapper">
            <div id="percent-text" style="font-size: 24px;">正在召喚 SioGirl...</div>
            <div id="status-msg">初始化引擎中...</div>
        </div>
    </div>
    <div id="ui-panel">
        <div id="chat-box"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="對她說話..." style="flex:1; padding:12px; border-radius:8px; border:none; background:#334155; color:white;">
            <button onclick="chat()" style="padding:10px 20px; background:#3b82f6; border:none; color:white; border-radius:8px; cursor:pointer;">發送</button>
        </div>
    </div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, (window.innerWidth/2) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.4, 3.0); // 稍微拉遠相機，確保能看到人

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth/2, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // 增加光照強度
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(1, 1, 1).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    const loader = new THREE.GLTFLoader();
    
    document.getElementById('status-msg').innerText = "連線至 GitHub 讀取模型...";

    loader.load('./SioGirl_Larry.vrm', 
        (gltf) => {
            THREE.VRM.from(gltf).then((vrm) => {
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI;
                document.getElementById('loader-wrapper').style.display = 'none';
                console.log("模型加載成功！");
            }).catch(err => {
                document.getElementById('status-msg').innerText = "VRM 格式轉換失敗: " + err;
            });
        }, 
        (progress) => {
            if (progress.total > 0) {
                const percent = Math.round((progress.loaded / progress.total) * 100);
                document.getElementById('percent-text').innerText = `正在召喚 SioGirl... ${percent}%`;
            } else {
                // 如果抓不到總大小，顯示已下載的 KB
                document.getElementById('percent-text').innerText = `下載中: ${Math.round(progress.loaded / 1024)} KB`;
            }
        }, 
        (error) => {
            document.getElementById('status-msg').innerText = "讀取失敗！請檢查檔名是否為 SioGirl_Larry.vrm";
            console.error(error);
        }
    );

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    function chat() {
        const input = document.getElementById('user-input');
        const text = input.value;
        if(!text) return;
        document.getElementById('chat-box').innerHTML += `<p>你: ${text}</p>`;
        input.value = "";
        
        setTimeout(() => {
            const resp = "哈囉！我還在調整我的虛擬身體，有看到我了嗎？";
            document.getElementById('chat-box').innerHTML += `<p style="color:#3b82f6">SioGirl: ${resp}</p>`;
            const utter = new SpeechSynthesisUtterance(resp);
            utter.lang = 'zh-TW';
            window.speechSynthesis.speak(utter);
        }, 500);
    }
</script>
</body>
</html>
